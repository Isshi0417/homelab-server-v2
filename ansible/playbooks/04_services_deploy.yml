---
# 1. PORTFOLIO VM DEPLOYMENT
- name: Deploy Portfolio Dashboard on Portfolio VM
  hosts: portfolio.lab.local
  gather_facts: true
  tasks:
    - name: Install Podman
      become: true
      ansible.builtin.apt:
        name: [podman, crun]
        state: present
        update_cache: true

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "/home/{{ admin_user }}/containers/portal"
        - "/home/{{ admin_user }}/containers/hamster"

    - name: Copy portal website files
      ansible.builtin.copy:
        src: "../../portal/"
        dest: "/home/{{ admin_user }}/containers/portal/"
        mode: "0644"

    - name: Copy hamster website files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ admin_user }}/containers/hamster/"
        mode: "0644"
      with_fileglob:
        - "../../hamster/*.html"
        - "../../hamster/*.css"
        - "../../hamster/*.js"

    - name: Copy hamster images
      ansible.builtin.copy:
        src: "../../hamster/images"
        dest: "/home/{{ admin_user }}/containers/hamster/"
        mode: "0644"

    - name: Deploy Portal Systemd Service
      become: true
      ansible.builtin.template:
        src: "templates/portal.service.j2"
        dest: "/etc/systemd/system/portal.service"
        mode: "0644"

    - name: Deploy Hamster Systemd Service
      become: true
      ansible.builtin.template:
        src: "templates/hamster.service.j2"
        dest: "/etc/systemd/system/hamster.service"
        mode: "0644"

    - name: Start and enable Portal service
      become: true
      ansible.builtin.systemd_service:
        name: portal.service
        state: started
        enabled: true
        daemon_reload: true

    - name: Start and enable Hamster service
      become: true
      ansible.builtin.systemd_service:
        name: hamster.service
        state: started
        enabled: true
        daemon_reload: true

