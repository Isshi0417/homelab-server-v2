# 4. NAVIDROME VM DEPLOYMENT
- name: Deploy Navidrome and Rclone Mount on Navidrome VM
  hosts: navidrome.lab.local
  gather_facts: true
  tasks:
    - name: Install Podman and utilities
      become: true
      ansible.builtin.apt:
        name: [podman, crun, fuse3, rclone]
        state: present
        update_cache: true

    - name: Enable user_allow_other in fuse.conf
      become: true
      ansible.builtin.lineinfile:
        path: /etc/fuse.conf
        regexp: '^#?user_allow_other'
        line: 'user_allow_other'

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "/home/{{ admin_user }}/.config/rclone"
        - "/home/{{ admin_user }}/containers/navidrome/config"
        - "/home/{{ admin_user }}/containers/navidrome/cache"

    - name: Create Google Drive mount point
      become: true
      ansible.builtin.file:
        path: /mnt/gdrive
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy rclone configuration
      ansible.builtin.template:
        src: "templates/rclone.conf.j2"
        dest: "/home/{{ admin_user }}/.config/rclone/rclone.conf"
        mode: "0600"

    - name: Configure rclone-mount systemd service
      become: true
      ansible.builtin.template:
        src: "templates/rclone-mount.service.j2"
        dest: /etc/systemd/system/rclone-mount.service
        mode: "0644"

    - name: Start rclone-mount service
      become: true
      ansible.builtin.systemd_service:
        name: rclone-mount
        state: started
        enabled: true
        daemon_reload: true

    - name: Deploy Navidrome Systemd Service
      become: true
      ansible.builtin.template:
        src: "templates/navidrome.service.j2"
        dest: "/etc/systemd/system/navidrome.service"
        mode: "0644"

    - name: Start and enable Navidrome service
      become: true
      ansible.builtin.systemd_service:
        name: navidrome.service
        state: started
        enabled: true
        daemon_reload: true
